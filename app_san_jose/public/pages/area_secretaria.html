<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Secretaria</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="../styles/estilopaneles.css">
</head>
<body>
  <div class="contenedor-padre">
    <header class="header">
      <nav>
        <a href="/area_secretaria">Secretaria</a>
        <ul>
          <a href="/area_secretaria">Inicio</a>
          <a id="editPerfilBtn" href="#">Mi perfil</a>
          <a id="logoutBtn">Cerrar sesión</a>
        </ul>
      </nav>
    </header>

    <main class="main">
      <div class="contenido-main">
        <h2>Bienvenido, <span id="nombreUsuario"></span></h2>

        <!-- Mis Estadísticas -->
        <div class="graficos" style="margin-top: 20px">
          <h4>Mis Estadísticas</h4>
          <div id="statsGrid" class="stats-grid"></div>
          <div id="donutsContainer" style="display:flex;justify-content:center;gap:36px;flex-wrap:wrap;padding:20px 0"></div>
        </div>

        <!-- Distribución + Motivos -->
        <div class="graficos-row">
          <div class="graficos">
            <h4>Distribución de calificaciones</h4>
            <canvas id="distribucionChart"></canvas>
          </div>
          <div class="graficos">
            <h4>Motivos más atendidos</h4>
            <canvas id="motivosChart"></canvas>
          </div>
        </div>

        <!-- Tendencia personal -->
        <div class="graficos">
          <h4>Evolución últimos 30 días</h4>
          <canvas id="tendenciaPersonalChart"></canvas>
        </div>

        <!-- Últimos comentarios -->
        <div id="comentariosSection" class="graficos" style="display:none">
          <h4>Últimos comentarios recibidos</h4>
          <div id="comentariosRecientes"></div>
        </div>

        <!-- Reporte personal -->
        <div class="graficos">
          <h4>Generar mi reporte</h4>
          <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px">
            <div>
              <label for="reporteInicio">Desde:</label>
              <input type="date" id="reporteInicio">
            </div>
            <div>
              <label for="reporteFin">Hasta:</label>
              <input type="date" id="reporteFin">
            </div>
            <button id="btnGenerarReporte">Generar reporte</button>
          </div>
          <div id="reportePreview" style="display:none">
            <iframe id="reporteIframe" width="100%" height="600px" style="border:none;border-radius:8px"></iframe>
            <div style="margin-top:10px">
              <button id="btnDescargarReporte">Descargar</button>
            </div>
          </div>
        </div>

        <!-- Estadísticas por día -->
        <div class="graficos">
          <h4>Estadísticas por Día</h4>

          <label for="tipoFiltro">Filtrar por:</label>
          <select id="tipoFiltro">
            <option value="fecha">Fecha específica</option>
            <option value="rango">Rango de fechas</option>
          </select>

          <div id="filtroFechaUnica">
            <label for="fechaFiltro">Fecha:</label>
            <input type="date" id="fechaFiltro" />
          </div>

          <div id="filtroRangoFechas">
            <label for="fechaInicoo">Desde:</label>
            <input type="date" id="fechaInicoo" />
            <label for="fechaFin">Hasta:</label>
            <input type="date" id="fechaFin" />
          </div>

          <button id="filtrarBtn">Filtrar</button>

          <div id="estadisticasDiarias"></div>
          <canvas id="graficoPastel" style="display:none"></canvas>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-inner">
        <p>&copy; <span id="anio"></span> Sistema de Atención — Secretaría</p>
        <p id="mensajeMotivacional" class="mensaje-ia"></p>
      </div>
    </footer>
  </div>

  <!-- Modal editar perfil -->
  <div id="editModal" class="em-overlay" style="display:none">
    <div class="em-box">
      <button class="em-close" id="emClose">✕</button>
      <p class="em-title">Editar perfil</p>
      <div class="em-group">
        <label>Usuario</label>
        <input type="text" id="emUsuario" class="em-input" maxlength="20" placeholder="Nuevo nombre de usuario" />
      </div>
      <div class="em-group">
        <label>Nueva contraseña</label>
        <input type="password" id="emPass" class="em-input" maxlength="30" placeholder="Dejar vacío para no cambiar" />
      </div>
      <div class="em-group">
        <label>Confirmar contraseña</label>
        <input type="password" id="emPassConfirm" class="em-input" maxlength="30" placeholder="Repite la nueva contraseña" />
      </div>
      <button class="em-save" id="emSave">Guardar cambios</button>
    </div>
  </div>

  <script src="../scripts/estadisticasUsuario.js"></script>
</body>
</html>
